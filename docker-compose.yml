version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis_config
    restart: always
    ports:
      - "6379:6379"
    networks:
      - config_network

  configapi:
    build:
      context: .
      dockerfile: ConfigWebApi/Dockerfile
    container_name: config_api
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - config_network

  configui:
    build:
      context: .
      dockerfile: ConfigWebUI/Dockerfile
    container_name: config_ui
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - configapi
    networks:
      - config_network

networks:
  config_network:
    driver: bridge
